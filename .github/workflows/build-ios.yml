name: Build XcodeGen App (Unsigned)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4
      with:
        persist-credentials: false

    - name: Configure Git for Swift Package Manager
      run: git config --global url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Generate Xcode Project
      run: xcodegen generate

    - name: Build Unsigned iOS App
      run: |
        xcodebuild clean build \
          -project IndicSwipe.xcodeproj \
          -scheme IndicSwipeContainer \
          -configuration Release \
          -arch arm64 \
          -sdk iphoneos \
          CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO \
          CONFIGURATION_BUILD_DIR=$(pwd)/build/Release-iphoneos
        
    - name: Package .ipa
      run: |
        mkdir -p Payload
        cp -R build/Release-iphoneos/IndicSwipeContainer.app Payload/
        zip -qr IndicSwipe-unsigned.ipa Payload

    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: IndicSwipe-iOS-Build
        path: IndicSwipe-unsigned.ipa
